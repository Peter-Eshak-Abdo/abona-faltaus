name: Daily Quotes

on:
  schedule:
    # المواعيد بتوقيت UTC (زود ساعتين لمصر)
    - cron: "0 7 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (9 صباحاً بتوقيت مصر)
    - cron: "0 14 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (4 صباحاً بتوقيت مصر)
    - cron: "0 20 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (10 صباحاً بتوقيت مصر)
  workflow_dispatch: # للسماح بالتشغيل اليدوي للتجربة

jobs:
  send_quote:
    runs-on: ubuntu-latest
    steps:
      - name: Hit API with Bypass
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            curl -i -X GET "https://abona-faltaus.vercel.app/api/daily-qoute" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
              -H "Referer: https://abona-faltaus.vercel.app/" \
              -H "Accept: application/json" && break

            if [ $attempt -lt 3 ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done
