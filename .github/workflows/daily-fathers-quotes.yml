name: Daily Quotes Notifications

on:
  schedule:
    # المواعيد بتوقيت UTC (زود ساعتين لمصر)
    - cron: '0 15 * * *' # الساعة 5 مساءً
    - cron: '0 20 * * *' # الساعة 11 مساءً
  workflow_dispatch: # للسماح بالتشغيل اليدوي للتجربة

jobs:
  send_quote:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Quotes API
        run: |
          curl -X GET "https://abona-faltaus.vercel.app/api/daily-quotes" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
