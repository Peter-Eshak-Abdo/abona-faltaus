name: Daily Verses

on:
  schedule:
    - cron: "0 6 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (8 صباحاً بتوقيت مصر)
    - cron: "0 13 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (3 صباحاً بتوقيت مصر)
    - cron: "0 19 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (9 صباحاً بتوقيت مصر)

  workflow_dispatch: # السطر ده هو الحل لمشكلة الـ Test! بيعملك زرار في جيت هاب تشغله وقت ما تحب

jobs:
  trigger-api:
    runs-on: ubuntu-latest
    steps:
      - name: Hit API with Bypass
        run: |
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            curl -i -X GET "https://abona-faltaus.vercel.app/api/daily-verse" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
              -H "Referer: https://abona-faltaus.vercel.app/" \
              -H "Accept: application/json" && break

            if [ $attempt -lt 3 ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done
