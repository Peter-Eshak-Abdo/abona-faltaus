name: Daily Verses

on:
  schedule:
    - cron: "0 6 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (8 صباحاً بتوقيت مصر)
    - cron: "0 13 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (3 صباحاً بتوقيت مصر)
    - cron: "0 19 * * *" # بيشتغل تلقائي كل يوم الساعة 7 بتوقيت جرينتش (9 صباحاً بتوقيت مصر)

  workflow_dispatch: # السطر ده هو الحل لمشكلة الـ Test! بيعملك زرار في جيت هاب تشغله وقت ما تحب

jobs:
  trigger-api:
    runs-on: ubuntu-latest
    steps:
      - name: Hit API and Show Response
        run: |
          for attempt in {1..5}; do
            echo "Attempt $attempt..."
            curl -f -i -X GET "https://abona-faltaus.vercel.app/api/daily-verse" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "User-Agent: CronJob-DailyVerses/1.0" \
              -H "Accept: application/json" && break

            if [ $attempt -lt 5 ]; then
              sleep $((2 ** attempt))
            fi
          done
